<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>Simple Navigattion Bar Animation | Pure CSS and JS</title>
</head>
<body>
   <div class="tab-container">
    <div class="indicator"></div>
    <button class="tab-button active" data-text="Home">
      <ion-icon name="home" size="large"></ion-icon>
    </button>
    <button class="tab-button" data-text="Search">
      <ion-icon name="search" size="large"></ion-icon>
    </button>
    <button class="tab-button" data-text="Message">
      <ion-icon name="mail" size="large"></ion-icon>
    </button>
    <button class="tab-button" data-text="Profile">
      <ion-icon name="person" size="large"></ion-icon>
    </button>
 </div> 

 <script type="module" src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
 <script src="frontendfocus.js"></script>
</body>
</html>
