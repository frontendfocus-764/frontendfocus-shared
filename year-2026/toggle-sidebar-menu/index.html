<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Sidebar Menu</title>
    <link rel="stylesheet" href="frontendfocus.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
</head>

<body>
    <div class="sidebar" data-theme="light">
        <div class="sidebar-theme_header">Themes</div>
        <div class="sidebar-themes">
            <div class="selector light"></div>
            <div class="sidebar-theme" data-theme="light">
                <div class="sidebar-theme_icon">
                    <span class="material-symbols-rounded">
                        light_mode
                    </span>
                </div>
                <div class="sidebar-theme_text">Light</div>
            </div>
            <div class="sidebar-theme" data-theme="dark">
                <div class="sidebar-theme_icon">
                    <span class="material-symbols-rounded">
                        dark_mode
                    </span>
                </div>
                <div class="sidebar-theme_text">Dark</div>
            </div>
        </div>

        <div class="sidebar-menu">
            <div class="sidebar-item active">
                <div class="sidebar-item_icon">
                    <span class="material-symbols-rounded">
                        door_front
                    </span>
                </div>
                <div class="sidebar-item_text">Home</div>
            </div>
            <div class="sidebar-item">
                <div class="sidebar-item_icon">
                    <span class="material-symbols-rounded">
                        all_inbox
                    </span>
                </div>
                <div class="sidebar-item_text">Inbox</div>
            </div>
            <div class="sidebar-item">
                <div class="sidebar-item_icon">
                    <span class="material-symbols-rounded">
                        unsubscribe
                    </span>
                </div>
                <div class="sidebar-item_text">Spam</div>
            </div>
            <div class="sidebar-item">
                <div class="sidebar-item_icon">
                    <span class="material-symbols-rounded">
                        show_chart
                    </span>
                </div>
                <div class="sidebar-item_text">Activity</div>
            </div>
            <div class="sidebar-item">
                <div class="sidebar-item_icon">
                    <span class="material-symbols-rounded">
                        database
                    </span>
                </div>
                <div class="sidebar-item_text">Database</div>
            </div>
            <div class="sidebar-item">
                <div class="sidebar-item_icon">
                    <span class="material-symbols-rounded">
                        dns
                    </span>
                </div>
                <div class="sidebar-item_text">Server Status</div>
            </div>
            <div class="sidebar-item">
                <div class="sidebar-item_icon">
                    <span class="material-symbols-rounded">
                        tune
                    </span>
                </div>
                <div class="sidebar-item_text">Settings</div>
            </div>
        </div>
    </div>

    <script src="frontendfocus.js"></script>
</body>

</html>
