<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>River Side Sun and Moon Animation</title>
</head>
<body>
    <img src="./img/4.png" alt="cloud" class="cloud" />
    <img src="./img/4.png" alt="cloud" class="cloud" />
    <img src="./img/4.png" alt="cloud" class="cloud" />
    <img src="./img/1.png" alt="forest" class="lake" />
    <div class="column-of-circles">
      <img src="./img/3.png" alt="moon" />
      <img src="./img/2.png" alt="sun" />
    </div>
    <label class="btn btn-day">
      Day
      <input type="radio" name="mode" class="day" />
    </label>
    <label class="btn btn-night">
      Night
      <input type="radio" name="mode" class="night" checked />
    </label>
</body>
</html>
