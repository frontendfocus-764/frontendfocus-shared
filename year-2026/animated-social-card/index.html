<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Social Card</title>
    <link rel="stylesheet" href="frontendfocus.css">
</head>
<body>
    <div class="scene landscape" id="scene">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <canvas id="particles"></canvas>

  <!-- Orientation Toggle -->
  <button class="orient-btn" id="orientBtn" title="Toggle orientation">
    <span class="orient-icon" id="orientIcon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"/>
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
        <path d="M3 22v-6h6"/>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
    </span>
  </button>

  <div class="card-wrap" id="cardWrap">
    <div class="card-halo"></div>
    <div class="card-ring"></div>
    <div class="card" id="card">

      <!-- LEFT -->
      <div class="col-left">
        <div class="avatar-wrap">
          <div class="avatar-glow"></div>
          <div class="avatar-ring"></div>
          <div class="avatar">
            <img src="ff.jpg" alt="Sandesh Singh">
          </div>
          <div class="badge"></div>
        </div>
        <div class="stats-side">
          <div class="stat-row"><span class="stat-row-label">Projects</span><span class="stat-row-num">248</span></div>
          <div class="stat-row"><span class="stat-row-label">Followers</span><span class="stat-row-num">14.2k</span></div>
          <div class="stat-row"><span class="stat-row-label">Following</span><span class="stat-row-num">931</span></div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="col-right">
        <div class="name">Sandesh Singh</div>
        <div class="handle">@frontendfocus</div>
        <div class="role-tag"><div class="role-dot"></div>Web Developer</div>
        <p class="bio">Crafting beautiful interfaces & turning code into experiences. Open source enthusiast. 🚀</p>

        <div class="stats-bar">
          <div class="stat"><span class="stat-num">248</span><span class="stat-label">Projects</span></div>
          <div class="stat"><span class="stat-num">14.2k</span><span class="stat-label">Followers</span></div>
          <div class="stat"><span class="stat-num">931</span><span class="stat-label">Following</span></div>
        </div>

        <div class="socials">
          <div class="social-btn tw"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.631L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg></div>
          <div class="social-btn gh"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg></div>
          <div class="social-btn ig"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></div>
          <div class="social-btn yt"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></div>
        </div>

        <div class="follow-wrap">
          <div class="follow-halo"></div>
          <div class="follow-ring"></div>
          <button class="follow-btn" id="followBtn"><span id="followText">Follow</span></button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="frontendfocus.js"></script>
</body>
</html>
