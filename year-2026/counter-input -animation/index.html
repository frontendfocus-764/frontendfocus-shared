<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>Animated Counter Button | HTML CSS JavaScript</title>
</head>
<body>
   <div class="n">
	<input class="n__value" type="number" name="number" value="10">
	<div class="n__btns">
		<button class="n__btn" type="button" data-step="+">
			<span class="n__btn-sr">Up</span>
			<span class="n__up"></span>
		</button>
		<button class="n__btn" type="button" data-step="-">
			<span class="n__btn-sr">Down</span>
			<span class="n__down"></span>
		</button>
	</div>
</div> 

<script src="frontendfocus.js"></script>
</body>
</html>
