<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 Creative CSS Button Animations</title>
    <link rel="stylesheet" href="frontendfocus.css">
</head>

<body>
    <div class="container">

        <!-- Button 1 -->
        <button class="btn-neon">HKTECHHUB</button>

        <!-- Button 2 -->
        <button class="btn-swipe">Hover Me</button>

        <!-- Button 3 -->
        <button class="btn-3d">Click Me</button>

        <!-- Button 4 -->
        <button class="btn-fill">Fill Hover</button>

        <!-- Button 5 -->
        <button class="btn-outline">Outline Flash</button>

        <!-- Button 6 -->
        <button class="btn-wave">Wave Effect</button>

    </div>
</body>

</html>
