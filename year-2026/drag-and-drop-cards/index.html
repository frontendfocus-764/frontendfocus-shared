<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop Cards</title>
    <link rel="stylesheet" href="frontendfocus.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <div class="drop">
        <div class="drop-container" id="drop-items">
            <div class="drop-card">
                <div class="drop-data">
                    <img src="img/ff-p1.jpg" alt="photo" class="drop-img">

                    <div>
                        <h1 class="drop-name">Clay</h1>
                        <span class="drop-profession">Web Developer</span>
                    </div>
                </div>

                <div>
                    <a href="#" class="drop-social"><i class="ri-instagram-line"></i></a>
                    <a href="#" class="drop-social"><i class="ri-facebook-fill"></i></a>
                    <a href="#" class="drop-social"><i class="ri-twitter-x-line"></i></a>
                </div>
            </div>

            <div class="drop-card">
                <div class="drop-data">
                    <img src="img/ff-p2.jpg" alt="photo" class="drop-img">

                    <div>
                        <h1 class="drop-name">Sara</h1>
                        <span class="drop-profession">Graphic Designer</span>
                    </div>
                </div>

                <div>
                    <a href="#" class="drop-social"><i class="ri-instagram-line"></i></a>
                    <a href="#" class="drop-social"><i class="ri-facebook-fill"></i></a>
                    <a href="#" class="drop-social"><i class="ri-twitter-x-line"></i></a>
                </div>
            </div>

            <div class="drop-card">
                <div class="drop-data">
                    <img src="img/ff-p3.jpg" alt="photo" class="drop-img">

                    <div>
                        <h1 class="drop-name">Robbie</h1>
                        <span class="drop-profession">UI/UX Designer</span>
                    </div>
                </div>

                <div>
                    <a href="#" class="drop-social"><i class="ri-instagram-line"></i></a>
                    <a href="#" class="drop-social"><i class="ri-facebook-fill"></i></a>
                    <a href="#" class="drop-social"><i class="ri-twitter-x-line"></i></a>
                </div>
            </div>

            <div class="drop-card">
                <div class="drop-data">
                    <img src="img/ff-p4.jpg" alt="photo" class="drop-img">

                    <div>
                        <h1 class="drop-name">Jenny</h1>
                        <span class="drop-profession">Digital Marketing</span>
                    </div>
                </div>

                <div>
                    <a href="#" class="drop-social"><i class="ri-instagram-line"></i></a>
                    <a href="#" class="drop-social"><i class="ri-facebook-fill"></i></a>
                    <a href="#" class="drop-social"><i class="ri-twitter-x-line"></i></a>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="main.js"></script>
    <script src="frontendfocus.js"></script>
</body>

</html>
