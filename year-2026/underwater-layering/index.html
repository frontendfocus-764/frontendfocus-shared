<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Layering</title>
    <link rel="stylesheet" href="frontendfocus.css">
</head>

<body>
    <div class="wrapper">

        <div class="ocean">

            <div class="grass"></div>
            <!-- ROCKS -->
            <div class="rock r1"></div>
            <div class="rock r2"></div>
            <div class="rock r3"></div>
            <div class="rock r4"></div>
            <div class="rock r5"></div>
            <div class="rock r6"></div>
            <div class="rock r7"></div>
            <div class="rock r8"></div>
            <div class="rock r9"></div>
            <div class="rock r10"></div>

            <!-- CORAL -->
            <div class="coral c1"></div>
            <div class="coral c2"></div>
            <div class="coral c3"></div>
            <div class="coral c4"></div>
            <div class="coral c5"></div>
            <div class="coral c6"></div>
            <div class="coral c7"></div>

            <div class="plant p1"></div>
            <div class="plant p2"></div>
            <div class="plant p3"></div>
            <div class="plant p4"></div>
            <div class="plant p5"></div>
            <div class="plant p6"></div>
            <div class="plant p7"></div>
            <div class="plant p8"></div>
            <div class="plant p9"></div>
            <div class="plant p10"></div>
            <div class="plant p11"></div>
            <div class="plant p12"></div>
            <div class="plant p13"></div>

            <div class="fish">
                <div class="eye"></div>
                <div class="tail"></div>
                <div class="fin"></div>
            </div>

            <div class="shark">
                <div class="eye"></div>
                <div class="mouth"></div>
                <div class="tail"></div>
                <div class="fin-top"></div>
                <div class="fin-side"></div>
            </div>

            <input type="checkbox" id="move-octo">
            <label for="move-octo" class="octopus">
                <div class="eye"></div>
                <div class="eye eye2"></div>
                <div class="mouth"></div>

                <div class="tentacle t1"></div>
                <div class="tentacle t2"></div>
                <div class="tentacle t3"></div>
                <div class="tentacle t4"></div>
                <div class="tentacle t5"></div>
                <div class="tentacle t6"></div>
                <div class="tentacle t7"></div>
                <div class="tentacle t8"></div>
            </label>

            <div class="bubble b1"></div>
            <div class="bubble b2"></div>
            <div class="bubble b3"></div>
            <div class="bubble b4"></div>
            <div class="bubble b5"></div>
            <div class="bubble b6"></div>
            <div class="bubble b7"></div>
            <div class="bubble b8"></div>
            <div class="bubble b9"></div>
            <div class="bubble b10"></div>
        </div>

        <div class="angel a1">
            <div class="eye"></div>
        </div>

        <div class="angel a2">
            <div class="eye"></div>
        </div>

        <div class="angel a3">
            <div class="eye"></div>
        </div>
        <div class="crab">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="claw left"></div>
            <div class="claw right"></div>

            <div class="leg l1"></div>
            <div class="leg l2"></div>
            <div class="leg l3"></div>
            <div class="leg l4"></div>
        </div>

        <div class="jelly j1">
            <div class="tentacle t1"></div>
            <div class="tentacle t2"></div>
            <div class="tentacle t3"></div>
            <div class="tentacle t4"></div>
        </div>

        <div class="jelly j2">
            <div class="tentacle t1"></div>
            <div class="tentacle t2"></div>
            <div class="tentacle t3"></div>
            <div class="tentacle t4"></div>
        </div>
</body>

</html>
