<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Realistic Torch Animation</title>
    <link rel="stylesheet" href="frontendfocus.css">
</head>

<body>
    <div class="wrapper">
        <div class="outer">
            <div class="title">Click on the Button of Torch for lighting</div>
            <div class="torchblock">
                <input type="radio" name="switch" value="on" />
                <input type="radio" name="switch" value="off" checked="checked" />
                <label for="switch" id="entypo-lamp"></label>
                <div class="btnouter"></div>
                <div class="torchhead"></div>
                <div class="lightblock"></div>
                <div class="backbg"></div>
                <div class="circle"></div>
            </div>

        </div>
    </div>
</body>

</html>
