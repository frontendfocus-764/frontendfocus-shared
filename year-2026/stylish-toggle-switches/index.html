<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Toggle Switch Designs</title>
    <link rel="stylesheet" href="frontendfocus.css">
</head>
<body>
    <h1>Creative Toggle Switch Designs</h1>

<div class="hk-toggle-grid">

  <div class="hk-toggle hk-tg-1">
    <input type="checkbox" id="tg1">
    <label for="tg1"></label>
    <span>Cyber</span>
  </div>

  <div class="hk-toggle hk-tg-2">
    <input type="checkbox" id="tg2">
    <label for="tg2"></label>
    <span>iOS</span>
  </div>

  <div class="hk-toggle hk-tg-3">
    <input type="checkbox" id="tg3">
    <label for="tg3"></label>
    <span>Material</span>
  </div>

  <div class="hk-toggle hk-tg-4">
    <input type="checkbox" id="tg4">
    <label for="tg4"></label>
    <span>Neumorph</span>
  </div>

  <div class="hk-toggle hk-tg-5">
    <input type="checkbox" id="tg5">
    <label for="tg5"></label>
    <span>Glass</span>
  </div>

  <div class="hk-toggle hk-tg-6">
    <input type="checkbox" id="tg6">
    <label for="tg6"></label>
    <span>Minimal</span>
  </div>

  <div class="hk-toggle hk-tg-7">
    <input type="checkbox" id="tg7">
    <label for="tg7"></label>
    <span>Glow</span>
  </div>

  <div class="hk-toggle hk-tg-8">
    <input type="checkbox" id="tg8">
    <label for="tg8"></label>
    <span>Outline</span>
  </div>

  <div class="hk-toggle hk-tg-9">
    <input type="checkbox" id="tg9">
    <label for="tg9"></label>
    <span>Fill</span>
  </div>

  <div class="hk-toggle hk-tg-10">
    <input type="checkbox" id="tg10">
    <label for="tg10"></label>
    <span>Pulse</span>
  </div>

</div>
</body>
</html>
