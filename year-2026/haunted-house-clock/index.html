<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="forntendfocus.css">
    <title>Haunted Colck Using CSS & JS</title>
</head>
<body>
    <div class="haunted-room">
  <div class="picture-frame frame-1">
    <div class="frame-inner-detail"></div>
    <div class="frame-corner corner-tl"></div>
    <div class="frame-corner corner-tr"></div>
    <div class="frame-corner corner-bl"></div>
    <div class="frame-corner corner-br"></div>
    <div class="portrait-canvas">
      <div class="portrait-character">🧛🏻‍♂️</div>
      <div class="portrait-vignette"></div>
    </div>
  </div>
  <div class="picture-frame frame-3">
    <div class="frame-inner-detail"></div>
    <div class="frame-corner corner-tl"></div>
    <div class="frame-corner corner-tr"></div>
    <div class="frame-corner corner-bl"></div>
    <div class="frame-corner corner-br"></div>
    <div class="portrait-canvas">
      <div class="portrait-character">🧟</div>
      <div class="portrait-vignette"></div>
    </div>
  </div>
  <div class="picture-frame frame-5">
    <div class="frame-inner-detail"></div>
    <div class="frame-corner corner-tl"></div>
    <div class="frame-corner corner-tr"></div>
    <div class="frame-corner corner-bl"></div>
    <div class="frame-corner corner-br"></div>
    <div class="portrait-canvas">
      <div class="portrait-character">🧙🏻‍♀️</div>
      <div class="portrait-vignette"></div>
    </div>
  </div>

  <div class="sconce sconce-left"></div>
  <div class="sconce sconce-right"></div>

  <div class="candle candle-left">
    <div class="flame"></div>
  </div>
  <div class="candle candle-right">
    <div class="flame"></div>
  </div>

  <div class="wall-clock">
    <div class="pediment">
      <div class="pediment-crown"></div>
      <div class="scroll-left"></div>
      <div class="scroll-right"></div>
    </div>

    <div class="columns">
      <div class="column column-left">
        <div class="column-capital"></div>
        <div class="column-base"></div>
      </div>
      <div class="column column-right">
        <div class="column-capital"></div>
        <div class="column-base"></div>
      </div>
    </div>

    <div class="clock-housing">
      <div class="clock-face">
        <div class="numbers">
          <div class="number num-12">XII</div>
          <div class="number num-1">I</div>
          <div class="number num-2">II</div>
          <div class="number num-3">III</div>
          <div class="number num-4">IV</div>
          <div class="number num-5">V</div>
          <div class="number num-6">VI</div>
          <div class="number num-7">VII</div>
          <div class="number num-8">VIII</div>
          <div class="number num-9">IX</div>
          <div class="number num-10">X</div>
          <div class="number num-11">XI</div>
        </div>

        <div class="clock-hands">
          <div class="hand hour-hand" id="hourHand"></div>
          <div class="hand minute-hand" id="minuteHand"></div>
          <div class="hand second-hand" id="secondHand"></div>
          <div class="center-hub"></div>
        </div>
      </div>
    </div>

    <div class="lower-case">
      <div class="pendulum-window">
        <div class="pendulum-assembly">
          <div class="pendulum">
            <div class="pendulum-rod"></div>
            <div class="pendulum-bob"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="ghost">👻</div>
</div>

<script src="frontendfocus.js"></script>
</body>
</html>
