<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>Animated Theme Switcher with Pure CSS</title>
</head>
<body>
    <div class="scene">
    <div class="images">
        <img src="img/img-1.png" class="dark">
        <img src="img/img-2.png" class="light">
    </div>
    <label class="switch" id="switch" aria-label="Switch">
        <input type="checkbox">
        <div class="track">
            <div class="lightsaber">
                <div class="light"></div>
                <div class="grip"></div>
                <div class="dark"></div>
            </div>
            <div class="thumb">
                <div class="side dark-side">
                    <div class="circle">
                        <div class="sub-circle"></div>
                    </div>
                </div>
                <div class="side light-side">
                    <div class="circle">
                        <div class="sub-circle"></div>
                    </div>
                    <div class="top">
                        <div class="left"></div>
                        <div class="right"></div>
                    </div>
                    <div class="center">
                        <div class="item-1"></div>
                        <div class="item-2"></div>
                        <div class="item-3"></div>
                        <div class="item-4"></div>
                        <div class="item-5"></div>
                    </div>
                    <div class="bottom">
                        <div class="line"></div>
                    </div>
                </div>
            </div>
        </div>

    </label>
</div>
<script src="frontendfocus.js"></script>
</body>
</html>
