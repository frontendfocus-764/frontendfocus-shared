<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>Pure CSS Triangle Loading Animation</title>
</head>
<body>   
<div class="container">
  <div class="crest">
    <div class="tri">
      <div class="line"></div>
      <div class="line left"></div>
      <div class="line right"></div>
    </div>
    <div class="sqHolder">
      <div class="sq left"></div>
      <div class="sq top"></div>
      <div class="sq right"></div>
    </div>
  </div>
</div> 
</body>
</html>
