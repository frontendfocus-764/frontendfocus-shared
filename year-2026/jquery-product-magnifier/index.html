<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Magnifier | JQuery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    <link rel="stylesheet" href="frontendfocus.css">
</head>

<body>
    <div class="owl-carousel owl-theme">
        <a href="img/large-1.jpg"><img src="img/w-1.jpg" class="zoom"></a>
        <a href="img/large-2.jpg"><img src="img/w-2.jpg" class="zoom"></a>
        <a href="img/large-3.jpg"><img src="img/w-3.jpg" class="zoom"></a>
        <a href="img/large-4.jpg"><img src="img/w-4.jpg" class="zoom"></a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/magnify/2.3.3/css/magnify.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/magnify/2.3.3/js/jquery.magnify.min.js"></script>
    <script src="frontendfocus.js"></script>
</body>


</html>
