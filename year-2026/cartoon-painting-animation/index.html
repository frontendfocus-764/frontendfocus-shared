<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>CSS Cartoon Painting</title>
</head>
<body>
   <div class="app">
      <div class="scene-container">
        <a
          class="signature-link"
          href="https://jgreen721dev.com"
          target="_blank"
        >
          <h4 class="signature">Justin G</h4>
        </a>
        <div class="land-container">
          <!--BUILDINGS -->
          <div class="buildings-row">
            <!-- BUILDINGS SECTION LEFT -->
            <div class="building-section building-section-1">
              <div class="building left-building"></div>
              <div class="building center-building-parent">
                <div class="center-building-roof">
                  <div class="attenae attenae-1"></div>
                  <div class="attenae attenae-2"></div>
                </div>
                <div class="center-building"></div>
              </div>
              <div class="building right-building-parent">
                <div class="right-building-roof"></div>
                <div class="right-building"></div>
              </div>
            </div>

            <!-- BUILDINGS SECTION RIGHT -->
            <div class="building-section building-section-2">
              <div class="left-house-container">
                <div class="left-roof"></div>
                <div class="left-house"></div>
              </div>
              <div class="center-house-container">
                <div class="center-roof"></div>
                <div class="center-top">
                  <div class="light"></div>
                </div>
                <div class="center-balcony-row"></div>
                <div class="center-house">
                  <div class="center-house-base"></div>
                </div>
              </div>
              <div class="right-slim-building"></div>
              <div class="right-building-container">
                <div class="right-building-flag-container">
                  <div class="flag-pole"></div>
                  <div class="flag"></div>
                </div>
                <div class="flag-building"></div>
              </div>
            </div>
          </div>

          <!--SKY SECITON-->
          <div class="sun"></div>
          <!-- CLOUDS-->
          <div class="clouds-row">
            <div class="cloud cloud-1">
              <span class="cloud-span span-1"></span>
              <span class="cloud-span span-2"></span>
              <span class="cloud-span span-3"></span>
            </div>
            <div class="cloud cloud-2">
              <span class="cloud-span span-1"></span>
              <span class="cloud-span span-2"></span>
              <span class="cloud-span span-3"></span>
            </div>
            <div class="cloud cloud-3">
              <span class="cloud-span span-1"></span>
              <span class="cloud-span span-2"></span>
              <span class="cloud-span span-3"></span>
            </div>
          </div>

          <!-- SEAGULLS SECTION -->
          <div class="seagulls-row">
            <div class="seagull seagull-1">
              <div class="seagull-left-wing"></div>
              <div class="seagull-right-wing"></div>
            </div>
            <div class="seagull seagull-2">
              <div class="seagull-left-wing"></div>
              <div class="seagull-right-wing"></div>
            </div>
            <div class="seagull seagull-3">
              <div class="seagull-left-wing"></div>
              <div class="seagull-right-wing"></div>
            </div>
          </div>

          <!-- HILLS/TREES -->
          <div class="ground-land-row">
            <div class="hill-row">
              <div class="tree-div">
                <div class="leaves"></div>
                <div class="tree"></div>
              </div>
              <div class="hills-col">
                <div class="hills">
                  <div class="hill left-hill"></div>
                  <div class="hill right-hill"></div>
                </div>
                <div class="hills hills-2">
                  <div class="hill left-hill"></div>
                  <div class="hill right-hill"></div>
                </div>
              </div>
              <div class="hills-col">
                <div class="hills">
                  <div class="hill left-hill"></div>
                  <div class="hill right-hill"></div>
                </div>
                <div class="hills hills-2">
                  <div class="hill left-hill"></div>
                  <div class="hill right-hill"></div>
                </div>
              </div>
              <div class="tree-div tree-div-2">
                <div class="leaves-top"></div>
                <div class="leaves-bottom"></div>
                <div class="tree"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- WATER SECTION -->
        <div class="water-container">
          <!-- TOP WAVES/BOAT SECTION -->
          <div class="top-wave-row">
            <!--TOP LEFT WAVE SECTION -->
            <div class="top-wave-section">
              <div class="jaws jaws-2"></div>
              <div class="flat-wave-section">
                <div class="top-flat-wave-row flat-wave-row">
                  <div
                    class="flat-wave flat-wave-1 flat-wave-animation-1"
                  ></div>
                  <div
                    class="flat-wave flat-wave-2 flat-wave-animation-2"
                  ></div>
                </div>
                <div class="middle-flat-wave-row flat-wave-row">
                  <div
                    class="flat-wave flat-wave-3 flat-wave-animation-2"
                  ></div>
                  <div
                    class="flat-wave flat-wave-4 flat-wave-animation-1"
                  ></div>
                </div>
                <div class="bottom-flat-wave-row flat-wave-row">
                  <div
                    class="flat-wave flat-wave-5 flat-wave-animation-1"
                  ></div>
                </div>
              </div>
            </div>

            <!-- TOP WAVE BOAT SECTION-->
            <div class="top-wave-boat-section">
              <div class="boat-container">
                <div class="sail-container">
                  <div class="sail-parent">
                    <div class="left-sail"></div>
                    <div class="mast"></div>
                    <div class="right-sail"></div>
                  </div>
                </div>
                <div class="boat"></div>
              </div>
              <div class="boat-waves-row">
                <div class="boat-waves">
                  <div class="boat-wave boat-wave-1"></div>
                  <div class="boat-wave boat-wave-2"></div>
                  <div class="boat-wave boat-wave-3"></div>
                  <div class="boat-wave boat-wave-4"></div>
                  <div class="boat-wave boat-wave-5"></div>
                  <div class="boat-wave boat-wave-6"></div>
                  <div class="boat-wave boat-wave-7"></div>
                  <div class="boat-wave boat-wave-8"></div>
                  <div class="boat-wave boat-wave-9"></div>
                  <div class="boat-wave boat-wave-10"></div>
                </div>
                <div class="circles">
                  <div class="circle circle-1"></div>
                  <div class="circle circle-2"></div>
                  <div class="circle circle-3"></div>
                  <div class="circle circle-4"></div>
                  <div class="circle circle-5"></div>
                  <div class="circle circle-6"></div>
                  <div class="circle circle-7"></div>
                  <div class="circle circle-8"></div>
                  <div class="circle circle-9"></div>
                  <div class="circle circle-10"></div>
                </div>
              </div>
            </div>

            <!-- TOP WAVE RIGHT SECTION-->
            <div class="top-wave-section">
              <div class="jaws jaws-1"></div>

              <div class="flat-wave-section">
                <div class="top-flat-wave-row flat-wave-row">
                  <div
                    class="flat-wave flat-wave-1 flat-wave-animation-1"
                  ></div>
                  <div
                    class="flat-wave flat-wave-2 flat-wave-animation-2"
                  ></div>
                </div>
                <div class="middle-flat-wave-row flat-wave-row">
                  <div
                    class="flat-wave flat-wave-3 flat-wave-animation-2"
                  ></div>
                  <div
                    class="flat-wave flat-wave-4 flat-wave-animation-1"
                  ></div>
                </div>
                <div class="bottom-flat-wave-row flat-wave-row">
                  <div
                    class="flat-wave flat-wave-5 flat-wave-animation-1"
                  ></div>
                </div>
              </div>
            </div>
          </div>

          <!-- BOTTOM WAVE SECTION-->
          <div class="bottom-wave-row">
            <!-- LEFT BOTTOM WAVE/FISH -->
            <div class="bottom-wave-section">
              <div class="fish-parent">
                <div style="--duration: 3.2s; --delay: 1s" class="fish-body">
                  <div class="fish-eye"></div>
                  <div class="fish-tail-container">
                    <div class="fish-tail"></div>
                    <div class="top-fish-tail"></div>
                    <div class="bottom-fish-tail"></div>
                  </div>
                </div>
              </div>
              <div style="--duration: 3s" class="bottom-waves">
                <div class="bottom-wave bottom-wave-1"></div>
                <div class="bottom-wave bottom-wave-2"></div>
                <div class="bottom-wave bottom-wave-3"></div>
                <div class="bottom-wave bottom-wave-4"></div>
                <div class="bottom-wave bottom-wave-5"></div>
                <div class="bottom-wave bottom-wave-6"></div>
                <div class="bottom-wave bottom-wave-7"></div>
                <div class="bottom-wave bottom-wave-8"></div>
                <div class="bottom-wave bottom-wave-9"></div>
                <div class="bottom-wave bottom-wave-10"></div>
                <div class="bottom-wave bottom-wave-11"></div>
                <div class="bottom-wave bottom-wave-12"></div>
                <div class="bottom-wave bottom-wave-13"></div>
                <div class="bottom-wave bottom-wave-14"></div>
                <div class="bottom-wave bottom-wave-15"></div>
                <div class="bottom-wave bottom-wave-16"></div>
                <div class="bottom-wave bottom-wave-17"></div>
                <div class="bottom-wave bottom-wave-18"></div>
                <div class="bottom-wave bottom-wave-19"></div>
                <div class="bottom-wave bottom-wave-20"></div>
              </div>
              <div
                style="--duration: 6.5s"
                class="bottom-waves bottom-waves-bottom"
              >
                <div class="bottom-wave bottom-wave-1"></div>
                <div class="bottom-wave bottom-wave-2"></div>
                <div class="bottom-wave bottom-wave-3"></div>
                <div class="bottom-wave bottom-wave-4"></div>
                <div class="bottom-wave bottom-wave-5"></div>
                <div class="bottom-wave bottom-wave-6"></div>
                <div class="bottom-wave bottom-wave-7"></div>
                <div class="bottom-wave bottom-wave-8"></div>
                <div class="bottom-wave bottom-wave-9"></div>
                <div class="bottom-wave bottom-wave-10"></div>
                <div class="bottom-wave bottom-wave-11"></div>
                <div class="bottom-wave bottom-wave-12"></div>
                <div class="bottom-wave bottom-wave-13"></div>
                <div class="bottom-wave bottom-wave-14"></div>
                <div class="bottom-wave bottom-wave-15"></div>
                <div class="bottom-wave bottom-wave-16"></div>
              </div>
            </div>
            <!-- RIGHT BOTTOM WAVE/FISH-->
            <div class="bottom-wave-section">
              <div class="fish-parent">
                <div style="--duration: 2.8s; --delay: 0s" class="fish-body">
                  <div class="fish-eye"></div>
                  <div class="fish-tail-container">
                    <div class="fish-tail"></div>
                    <div class="top-fish-tail"></div>
                    <div class="bottom-fish-tail"></div>
                  </div>
                </div>
              </div>
              <div style="--duration: 4.5s" class="bottom-waves">
                <div class="bottom-wave bottom-wave-1"></div>
                <div class="bottom-wave bottom-wave-2"></div>
                <div class="bottom-wave bottom-wave-3"></div>
                <div class="bottom-wave bottom-wave-4"></div>
                <div class="bottom-wave bottom-wave-5"></div>
                <div class="bottom-wave bottom-wave-6"></div>
                <div class="bottom-wave bottom-wave-7"></div>
                <div class="bottom-wave bottom-wave-8"></div>
                <div class="bottom-wave bottom-wave-9"></div>
                <div class="bottom-wave bottom-wave-10"></div>
                <div class="bottom-wave bottom-wave-11"></div>
                <div class="bottom-wave bottom-wave-12"></div>
                <div class="bottom-wave bottom-wave-13"></div>
                <div class="bottom-wave bottom-wave-14"></div>
                <div class="bottom-wave bottom-wave-15"></div>
                <div class="bottom-wave bottom-wave-16"></div>
                <div class="bottom-wave bottom-wave-17"></div>
                <div class="bottom-wave bottom-wave-18"></div>
                <div class="bottom-wave bottom-wave-19"></div>
                <div class="bottom-wave bottom-wave-20"></div>
              </div>
              <div
                style="--duration: 6.5s"
                class="bottom-waves bottom-waves-bottom"
              >
                <div class="bottom-wave bottom-wave-1"></div>
                <div class="bottom-wave bottom-wave-2"></div>
                <div class="bottom-wave bottom-wave-3"></div>
                <div class="bottom-wave bottom-wave-4"></div>
                <div class="bottom-wave bottom-wave-5"></div>
                <div class="bottom-wave bottom-wave-6"></div>
                <div class="bottom-wave bottom-wave-7"></div>
                <div class="bottom-wave bottom-wave-8"></div>
                <div class="bottom-wave bottom-wave-9"></div>
                <div class="bottom-wave bottom-wave-10"></div>
                <div class="bottom-wave bottom-wave-11"></div>
                <div class="bottom-wave bottom-wave-12"></div>
                <div class="bottom-wave bottom-wave-13"></div>
                <div class="bottom-wave bottom-wave-14"></div>
                <div class="bottom-wave bottom-wave-15"></div>
                <div class="bottom-wave bottom-wave-16"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
</body>
</html>
