<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radial Dial Control Menu</title>
    <link rel="stylesheet" href="frontendfocus.css">
</head>
<body>
   <main>
  <div>
    <div class="selector">
      <div class="knob"></div>
      <ul>
        <li>
          <span>Back</span>
          <input type="radio" name="choice-a" checked />
        </li>
        <li>
          <span>Home</span>
          <input type="radio" name="choice-a" />
        </li>
        <li>
          <span>Search</span>
          <input type="radio" name="choice-a" />
        </li>
        <li>
          <span>Star</span>
          <input type="radio" name="choice-a" />
        </li>
        <li>
          <span>More</span>
          <input type="radio" name="choice-a" />
        </li>
        <li>
          <span>Refresh</span>
          <input type="radio" name="choice-a" />
        </li>
      </ul>
    </div>
  </div>
  
  <div data-theme="dark">
    <div class="selector">
      <div class="knob"></div>
      <ul>
        <li>
          <span>Back</span>
          <input type=radio name=choice checked />
        </li>
        <li>
          <span>Home</span>
          <input type=radio name=choice />
        </li>
        <li>
          <span>Search</span>
          <input type=radio name=choice />
        </li>
        <li>
          <span>Star</span>
          <input type=radio name=choice />
        </li>
        <li>
          <span>More</span>
          <input type=radio name=choice />
        </li>
        <li>
          <span>Refresh</span>
          <input type=radio name=choice />
        </li>
      </ul>
    </div>
  </div>
</main> 

<script src="frontendfocus.js"></script>
</body>
</html>
