<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Day Night Animations</title>
    <link rel="stylesheet" href="frontendfocus.css">
</head>

<body>
    <div class="scene">

        <!-- Sky -->
        <div class="sky"></div>

        <!-- Stars -->
        <div class="stars">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>

        <!-- Sun / Moon orb -->
        <div class="orb"></div>

        <!-- Clouds -->
        <div class="clouds">
            <div class="cloud cl-a"></div>
            <div class="cloud cl-b"></div>
            <div class="cloud cl-c"></div>
        </div>

        <!-- Mountains back -->
        <div class="mtn mtn-back"></div>

        <!-- Mountains mid -->
        <div class="mtn mtn-mid"></div>

        <!-- Bird -->
        <div class="bird-wrap">
            <div class="bird"><i></i><i></i></div>
        </div>

        <!-- Trees back -->
        <svg class="trees trees-back" viewBox="0 0 1200 220" preserveAspectRatio="none"
            xmlns="http://www.w3.org/2000/svg">
            <g class="tree-group-back">
                <polygon points="60,220 95,120 130,220" />
                <polygon points="150,220 182,130 214,220" />
                <polygon points="250,220 288,118 326,220" />
                <polygon points="360,220 395,128 430,220" />
                <polygon points="480,220 518,115 556,220" />
                <polygon points="590,220 625,125 660,220" />
                <polygon points="700,220 738,120 776,220" />
                <polygon points="820,220 856,130 892,220" />
                <polygon points="930,220 968,118 1006,220" />
                <polygon points="1060,220 1098,122 1136,220" />
            </g>
        </svg>

        <!-- Trees front -->
        <svg class="trees trees-front" viewBox="0 0 1200 300" preserveAspectRatio="none"
            xmlns="http://www.w3.org/2000/svg">
            <g class="tree-group-front">
                <polygon points="0,300 48,160 96,300" />
                <polygon points="100,300 150,145 200,300" />
                <polygon points="220,300 275,152 330,300" />
                <polygon points="370,300 425,148 480,300" />
                <polygon points="520,300 575,155 630,300" />
                <polygon points="660,300 715,150 770,300" />
                <polygon points="800,300 858,145 916,300" />
                <polygon points="940,300 995,158 1050,300" />
                <polygon points="1080,300 1138,152 1196,300" />
            </g>
        </svg>

        <!-- Ground -->
        <div class="ground"></div>

        <!-- Fireflies (night only) -->
        <div class="fireflies">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

    </div>
</body>

</html>
