<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Snowy Weather</title>
    <link rel="stylesheet" href="frontendfocus.css">
</head>
<body>
    <div class="background-scene"></div>

<div class="weather-card">
  <div class="snow-layer" id="snowContainer"></div>

  <div class="top-section">
    <div class="location">
      <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <span>New York, US</span>
    </div>
    <div class="live-date" id="dateDisplay">Loading Date...</div>
  </div>

  <div class="middle-section">
    <div class="icon-temp">
      <div class="weather-icon">
        <div class="cloud"></div>
        <div class="snowflakes-icon">❄</div>
      </div>
      <h1 class="temp">-4°</h1>
    </div>
    <p class="condition">Heavy Snowfall</p>
  </div>

  <div class="bottom-details">
    <div class="detail-box">
      <span class="label">Wind</span>
      <span class="value">12 km/h</span>
    </div>
    <div class="detail-box">
      <span class="label">Humidity</span>
      <span class="value">88%</span>
    </div>
    <div class="detail-box">
      <span class="label">Real Feel</span>
      <span class="value">-7°</span>
    </div>
  </div>
</div>

<script src="frontendfous.js"></script>
</body>
</html>
