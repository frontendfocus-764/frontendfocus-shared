<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>3D Hover Card Animation | HTML CSS JavaScript</title>
</head>
<body>
  <div class="centered">
  <div class="card border-left-behind">
    <div class="shadow" style="--url: url('./img/full.png')"></div>
    <div class="image background" style="--url: url('./img/Background.png')"></div>
    <div class="image cutout" style="--url: url('./img/cutout.png')"></div>
    <div class="content">
      <h2>Hover me!</h2>
      <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.</p>
    </div>
  </div>
  <div class="card border-right-behind border-bottom-behind">
    <div class="shadow" style="--url: url('./img/m-full.png')"></div>
    <div class="image background" style="--url: url('./img/m-background.png')"></div>
    <div class="image cutout" style="--url: url('./img/m-cutout.png')"></div>
    <div class="content">
      <h2>Hover me!</h2>
      <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.</p>
    </div>
  </div>
  <div class="card border-left-behind">
    <div class="shadow" style="--url: url('./img/b-full.png')"></div>
    <div class="image background" style="--url: url('./img/b-background.png')"></div>
    <div class="image cutout" style="--url: url('./img/b-cutout.png')"></div>
    <div class="content">
      <h2>Hover me!</h2>
      <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.</p>
    </div>
  </div>
</div> 

<script src="frontendfocus.js"></script>
</body>
</html>
