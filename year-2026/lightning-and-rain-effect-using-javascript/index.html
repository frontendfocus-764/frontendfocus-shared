<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="frontendfocus.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap"
      rel="stylesheet"
    />
    <title>Realistic Rain Animation with HTML Canvas</title>
  </head>
  <body class="bg-black overflow-hidden w-full h-screen m-0 p-0">
    <canvas id="rainCanvas"></canvas>
    <div
      class="pointer-events-none fixed inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,rgba(0,0,0,0.8)_100%)]"
    ></div>

    <script src="frontendfocus.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </body>
</html>
