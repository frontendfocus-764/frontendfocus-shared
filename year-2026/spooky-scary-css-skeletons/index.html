<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>Spooky Scary Skeletons | Pure CSS No JavaScript</title>
</head>
<body>   
<div class="skeleton-cont wave-dance">
  <div class="skeleton">
    <div class="head">
      <div class="skull">
        <div class="mouth"></div>
      </div>
      <div class="ribcage">
        <div class="shoulders"></div>
        <div class="ur-arm">
          <div class="lr-arm">
            <div class="r-hand"></div>
          </div>
        </div>
        <div class="ul-arm">
          <div class="ll-arm">
            <div class="l-hand"></div>
          </div>
        </div>
        <div class="spine"></div>
        <div class="hips">
          <div class="r-femur">
            <div class="r-shin">
              <div class="r-foot"></div>
            </div>
          </div>
          <div class="l-femur">
            <div class="l-shin">
              <div class="l-foot"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
