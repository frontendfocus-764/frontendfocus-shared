<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>Document</title>
</head>
<body>
   <label class="toggle-switch">
  <input type="checkbox" class="toggle-input" />
  <span class="toggle-track">
    <span class="toggle-rust"></span>
    <span class="toggle-glow"></span>
    <span class="toggle-thumb">
      <span class="thumb-inner"></span>
      <span class="thumb-shine"></span>
    </span>
    <span class="toggle-icons">
      <svg
        class="icon-off"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="12" cy="12" r="5"></circle>
        <path
          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
        ></path>
      </svg>
      <svg class="icon-on" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313-12.454z"
        ></path>
      </svg>
    </span>
  </span>
  <span class="toggle-label">
    <span class="label-off">OFF</span>
    <span class="label-on">ON</span>
  </span>
</label> 
</body>
</html>
