<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>CSS Text Animations Collection</title>
</head>
<body>
   <div class="container">
  <div class="animate seven">
    <span>F</span><span>r</span><span>o</span><span>n</span><span>t</span><span>e</span><span>n</span><span>d</span>&nbsp;
    <span>F</span><span>o</span><span>c</span><span>u</span><span>s</span>
    <a class="repeat" href="javascript:void(0);">Run Again 🚀</a>
  </div>

  <div class="animate one">
    <span>T</span><span>e</span><span>x</span><span>t</span>&nbsp;
    <span>E</span><span>f</span><span>f</span><span>e</span><span>c</span><span>t</span><span>s</span>
    <a class="repeat" href="javascript:void(0);">Run Again 🚀</a>
  </div>

  <div class="animate two">
    <span>C</span><span>S</span><span>S</span>&nbsp;
    <span>M</span><span>a</span><span>g</span><span>i</span><span>c</span>
    <a class="repeat" href="javascript:void(0);">Run Again 🚀</a>
  </div>

  <div class="animate three">
    <span>S</span><span>m</span><span>o</span><span>o</span><span>t</span><span>h</span>&nbsp;
    <span>U</span><span>I</span>
    <a class="repeat" href="javascript:void(0);">Run Again 🚀</a>
  </div>

  <div class="animate four">
    <span>W</span><span>e</span><span>b</span>&nbsp;
    <span>A</span><span>n</span><span>i</span><span>m</span><span>a</span><span>t</span><span>i</span><span>o</span><span>n</span>
    <a class="repeat" href="javascript:void(0);">Run Again 🚀</a>
  </div>

  <div class="animate five">
    <span>C</span><span>r</span><span>e</span><span>a</span><span>t</span><span>i</span><span>v</span><span>e</span>&nbsp;
    <span>D</span><span>e</span><span>s</span><span>i</span><span>g</span><span>n</span>
    <a class="repeat" href="javascript:void(0);">Run Again 🚀</a>
  </div>

  <div class="animate six">
    <span>H</span><span>T</span><span>M</span><span>L</span>&nbsp;
    <span>&</span>&nbsp;
    <span>C</span><span>S</span><span>S</span>
    <a class="repeat" href="javascript:void(0);">Run Again 🚀</a>
  </div>
</div> 

   <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="frontendfocus.js"></script>
</body>
</html>
