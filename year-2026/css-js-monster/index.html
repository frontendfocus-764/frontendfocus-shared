<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>Cursor Eye Follow Monster | CSS & JS</title>
</head>
<body>
    
<div class="creature-cage">
  <div class="creature-body">
    <div class="eyeball">
      <div class="brow"></div>
      <div id="leftPupil"></div>
    </div>
    <div class="eyeball right">
      <div class="brow right"></div>
      <div id="rightPupil"></div>
    </div>
    <div class="hair-tuft">
      <div class="hair"></div>
      <div class="hair hair-middle-dark"></div>
      <div class="hair hair-right"></div>
    </div>
    <div class="hair-tuft hair-tuft-right">
      <div class="hair"></div>
      <div class="hair hair-middle-dark"></div>
      <div class="hair hair-right"></div>
    </div>
    <div class="mouth">
      <div class="tongue"></div>
      <div class="drool"></div>
    </div>
  </div>
  <div class="hand hand-left">
    <div class="finger"></div>
    <div class="finger finger-middle"></div>
    <div class="finger finger-right"></div>
  </div>
  <div class="hand hand-right">
    <div class="finger"></div>
    <div class="finger finger-middle"></div>
    <div class="finger finger-right"></div>
  </div>
</div>
<script src="frontendfocus.js"></script>
</body>
</html>
