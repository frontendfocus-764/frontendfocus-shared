<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontendfocus.css">
    <title>Traffic Flow Controller | CSS Animation System</title>
</head>
<body>
    <div class="wrapper">
        <input type="radio" name="mode" id="stop" checked>
        <input type="radio" name="mode" id="slow">
        <input type="radio" name="mode" id="go">

        <div class="traffic-light">
            <label for="stop" class="light red"></label>
            <label for="slow" class="light yellow"></label>
            <label for="go" class="light green"></label>
        </div>

        <div class="road">
            <div class="car car1"></div>
            <div class="car car2"></div>
            <div class="car car3"></div>
        </div>
    </div>
</body>
</html>
